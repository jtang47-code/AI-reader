<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Readilee - AI Bilingual Library</title>
    
    <!-- iOS & Android App Icons and Settings -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="Readilee">
    <meta name="application-name" content="Readilee">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#fdfaee" id="themeColorMeta">

    <!-- Dynamic Web App Manifest & Service Worker for Desktop PWA Installation -->
    <link rel="manifest" id="pwa-manifest">
    <script>
        (function() {
            // Generate Manifest dynamically to ensure absolute path for icon.png
            const iconUrl = new URL('icon.png', window.location.href).href;
            const manifest = {
                name: "Readilee",
                short_name: "Readilee",
                start_url: window.location.pathname,
                display: "standalone",
                background_color: "#fdfaee",
                theme_color: "#fdfaee",
                icons: [
                    { src: iconUrl, sizes: "192x192", type: "image/png", purpose: "any maskable" },
                    { src: iconUrl, sizes: "512x512", type: "image/png", purpose: "any maskable" }
                ]
            };
            const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
            document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);

            // Dummy Service Worker to satisfy Chrome's installation requirements
            if ('serviceWorker' in navigator) {
                const swCode = "self.addEventListener('fetch', () => {});";
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Claude-inspired Light Theme */
            --bg-primary: #fdfaee;    
            --bg-secondary: #ffffff;  
            --bg-tertiary: #f3f1e8;   
            --text-primary: #2d2d2d;  
            --text-secondary: #6b6a68; 
            --accent: #2d2d2d;        
            --border: #e6e4dc;        
        }

        body.dark {
            /* Claude-inspired Dark Theme */
            --bg-primary: #1e1d1c;
            --bg-secondary: #272625;
            --bg-tertiary: #2a2928;
            --text-primary: #e8e6e3;
            --text-secondary: #9c9a98;
            --accent: #e8e6e3;
            --border: #383736;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif;
        }

        /* Keep shell transitions smooth, but make dense reading text switch instantly on iPad */
        #pageContent,
        #pageContent .paragraph-block,
        #pageContent .paragraph-text,
        #pageContent .sentence,
        #pageContent .word,
        #pageContent .word *,
        #pageContent .sentence * {
            transition: none !important;
        }

        /* Bookmark icon should feel immediate on touch devices */
        #bookmarkBtn,
        #bookmarkBtn svg,
        #bookmarkBtn path {
            transition: color 120ms ease, fill 120ms ease, stroke 120ms ease, transform 120ms ease !important;
            will-change: transform;
        }

        #bookmarkBtn.is-active {
            color: #d97757;
        }

        /* FORCE FLUID THEME TRANSITIONS WITHOUT IPAD CPU LAG */
        /* Explicitly target layout elements. Bypassing spans fixes iPad rendering freezes */
        div, header, main, aside, nav, button, input, select, h1, h2, h3, p, svg, path, a, li {
            transition-property: background-color, border-color, color, fill, stroke, accent-color, box-shadow;
            transition-duration: 300ms;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Immediately inherit color for thousands of words to save iPad CPU */
        span:not(.sentence) {
            transition: none !important;
        }
        /* Safely restore hover animation for sentences */
        span.sentence {
            transition: background-color 200ms ease;
        }

        /* FORCE TAILWIND UTILITIES TO SYNC WITH 300MS THEME FADE */
        .transition, .transition-all, .transition-colors, .transition-opacity, .transition-transform {
            transition-duration: 300ms !important;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        /* Combine Tailwind's layout transitions WITH our color transitions so nothing snaps */
        .transition-transform { 
            transition-property: transform, background-color, border-color, color, fill, stroke, accent-color, box-shadow !important; 
        }
        .transition-opacity { 
            transition-property: opacity, background-color, border-color, color, fill, stroke, accent-color, box-shadow !important; 
        }
        .transition-all { 
            transition-property: all !important; 
        }

        /* LOGO FONT */
        .logo-text {
            font-family: 'Newsreader', serif;
            font-style: normal;
            font-weight: 500;
        }

        /* BOOK TYPOGRAPHY */
        .book-text {
            font-family: 'Newsreader', serif;
            line-height: 1.7;
            font-size: 1.15rem;
            color: var(--text-primary);
            overflow-wrap: break-word;
            word-break: normal;
            hyphens: none;
        }

        #pageContent {
            overflow-x: hidden;
        }

        .paragraph-block {
            margin-bottom: 1.5em;
            display: block;
            width: 100%;
        }

        .is-immersive .paragraph-block {
            text-align: justify;
            text-justify: inter-word;
        }

        .paragraph-text {
            display: inline;
            white-space: normal;
        }

        /* Clickable sentence span */
        .sentence {
            cursor: pointer;
            display: inline;
            border-radius: 3px;
        }
        .sentence:hover {
            background-color: var(--bg-tertiary);
        }
        body.dark .sentence:hover {
            background-color: rgba(255,255,255,0.05);
        }

        /* Sentence translation popover */
        #sentencePopover {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            box-shadow: 0 12px 30px -10px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 90vw;
            border-radius: 12px;
            z-index: 100;
        }
        #sentencePopover .sentence-orig {
            font-family: 'Newsreader', serif;
            font-size: 1.05em;
            line-height: 1.5;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }
        #sentencePopover .sentence-trans {
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            color: var(--text-primary);
            font-weight: 500;
            line-height: 1.5;
        }

        .word {
            display: inline;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* UI Elements */
        .btn-theme {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-theme:hover { background-color: var(--border); }

        .sidebar-item {
            cursor: pointer;
            padding: 6px 10px;
            margin-bottom: 2px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            touch-action: manipulation; /* Removes iOS 300ms tap delay */
        }
        .sidebar-item:hover { 
            background-color: var(--bg-secondary); 
            color: var(--text-primary); 
        }

        #wordPopover {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            box-shadow: 0 12px 30px -10px rgba(0,0,0,0.1);
            border-radius: 12px;
            z-index: 100;
        }

        .hidden { display: none !important; }
        
        /* Custom translucent scrollbar to eliminate Theme-Switch Snapping */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(140, 140, 140, 0.35); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(140, 140, 140, 0.55); }

        /* Hide number input arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        /* Flawless font slider theme transition sync */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background-color: var(--border); /* Track color directly on input */
            height: 4px;
            border-radius: 2px;
            cursor: pointer;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            background-color: var(--text-primary);
            height: 14px;
            width: 14px;
            border-radius: 50%;
            transition: background-color 300ms cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        input[type="range"]::-moz-range-thumb {
            border: none;
            background-color: var(--text-primary);
            height: 14px;
            width: 14px;
            border-radius: 50%;
            transition: background-color 300ms cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden transition-colors duration-300">

    <!-- CONFIGURATION AREA -->
    <script>
        const DEEPSEEK_API_KEY = "sk-6245d4a4a89b4bae9db311fd3d83d17c";

    <header class="h-16 flex-none bg-[var(--bg-primary)] border-b border-[var(--border)] flex items-center justify-between px-6 z-20">
        <div class="flex items-center gap-4">
            <button id="sidebarToggle" class="hidden p-2 -ml-2 rounded-lg hover:bg-[var(--bg-tertiary)] text-[var(--text-secondary)] hover:text-[var(--text-primary)]" onclick="toggleSidebar()" style="touch-action: manipulation;">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="flex items-center gap-2 cursor-pointer transition-transform hover:scale-[1.02]" onclick="showLibrary()">

            </div>
            <div id="pageNavCtrl" class="hidden flex items-center gap-1 bg-[var(--bg-tertiary)] rounded-md p-1 border border-[var(--border)]">

                <div class="flex items-center justify-center min-w-[3.5rem]">

                </div>
                <button onclick="changePage(1)" class="p-1 hover:bg-[var(--bg-secondary)] rounded text-[var(--text-secondary)] hover:text-[var(--text-primary)] w-7 text-center" style="touch-action: manipulation;">→</button>
            </div>
            <button id="themeToggle" class="w-8 h-8 flex items-center justify-center rounded-full btn-theme text-sm" style="touch-action: manipulation;">🌗</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">

        <aside id="mainSidebar" class="flex-none bg-[var(--bg-tertiary)] border-r border-transparent flex flex-col z-10 transition-all duration-300 w-0 opacity-0 overflow-hidden">

                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Back to Library
                    </button>

                    <!-- Bookmarks -->
                    <h3 class="text-[10px] uppercase tracking-wider font-semibold text-[var(--text-secondary)] mb-2 px-2">Bookmarks</h3>
                    <div id="sidebarBookmarks" class="flex-1 overflow-y-auto space-y-0.5">
                        <li class="text-xs text-[var(--text-secondary)] p-2 italic list-none">No bookmarks</li>
                    </div>
                </div>
            </div>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 overflow-hidden relative bg-[var(--bg-primary)]" id="mainScroll">

                    <h2 id="bookTitleDisplay" class="text-2xl font-medium logo-text text-[var(--text-primary)] line-clamp-1">Untitled</h2>
                    
                    <!-- iPad Bookmark Fix: touch-action removes tap delay. transition overrides global 300ms so it snaps color fast. -->
                    <button onclick="toggleBookmark()" id="bookmarkBtn" class="text-[var(--text-secondary)] hover:text-[var(--text-primary)]" style="touch-action: manipulation; transition: color 0.15s, transform 0.15s;">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M5 3v18l7-3 7 3V3H5z"/></svg>

        <button id="deleteBookBtn" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20" style="touch-action: manipulation;">Delete</button>
    </div>

    <!-- Add Book & Language Selection Modal -->
    <div id="langModal" class="fixed inset-0 bg-black/20 z-[200] flex items-center justify-center hidden opacity-0 transition-opacity duration-200 backdrop-blur-sm">
        <div class="bg-[var(--bg-secondary)] p-6 rounded-2xl shadow-2xl max-w-sm w-full border border-[var(--border)] transform scale-95 transition-transform duration-300" id="langModalContent">
            <h3 class="text-lg font-medium mb-1 text-[var(--text-primary)]">Book Settings</h3>
            <p class="text-xs text-[var(--text-secondary)] mb-5">Select the target translation language for this text.</p>
            
            <select id="modalLangSelect" class="w-full p-2.5 rounded-lg border border-[var(--border)] bg-[var(--bg-tertiary)] text-[var(--text-primary)] text-sm mb-3 outline-none focus:border-[var(--text-primary)]">
                <option value="English">English</option>
                <option value="Spanish">Spanish</option>
                <option value="French">French</option>
                <option value="German">German</option>
                <option value="Chinese">Chinese</option>
                <option value="Japanese">Japanese</option>
                <option value="Custom">Custom...</option>
            </select>

            <input type="text" id="customLangInput" placeholder="Enter language (e.g. Esperanto)" class="hidden w-full p-2.5 rounded-lg border border-[var(--border)] bg-[var(--bg-tertiary)] text-[var(--text-primary)] text-sm mb-6 outline-none focus:border-[var(--text-primary)]">
            
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="cancelUpload()" class="px-4 py-2 text-xs font-medium text-[var(--text-secondary)] hover:bg-[var(--bg-tertiary)] rounded-lg" style="touch-action: manipulation;">Cancel</button>
                <button onclick="confirmUpload()" id="confirmUploadBtn" class="px-5 py-2 text-xs font-medium bg-[var(--text-primary)] text-[var(--bg-primary)] rounded-lg hover:opacity-90 flex items-center justify-center min-w-[100px]" style="touch-action: manipulation;">
                    Import Book
                </button>
            </div>
        </div>
    </div>

    <!-- Word Definition Popover -->
    <div id="wordPopover" class="fixed p-4 w-64 hidden transition-opacity duration-200 z-[100]">
        <div class="flex justify-between items-start mb-2">
            <span id="targetWord" class="font-medium text-[var(--text-primary)]">Word</span>
            <button onclick="closePopover()" class="text-[var(--text-secondary)] hover:text-[var(--text-primary)] text-lg leading-none" style="touch-action: manipulation;">&times;</button>
        </div>
        <div id="wordDefinition" class="text-xs text-[var(--text-secondary)] leading-relaxed">Loading...</div>
    </div>

    <!-- Sentence Translation Popover -->
    <div id="sentencePopover" class="fixed p-5 hidden transition-opacity duration-200 z-[100]">
        <div class="flex justify-between items-start mb-3">
            <span class="text-[10px] font-semibold uppercase tracking-widest text-[var(--text-secondary)]">Translation</span>
            <button onclick="closeSentencePopover()" class="text-[var(--text-secondary)] hover:text-[var(--text-primary)] text-lg leading-none" style="touch-action: manipulation;">&times;</button>
        </div>
        <div class="sentence-orig" id="sentenceOrigText"></div>
        <div class="sentence-trans" id="sentenceTransText">Loading...</div>
    </div>

    <script>
        let appState = {
            id: null,
            title: "Untitled Book",
            pages: [],
            bookmarks: [],
            currentPage: 0,
            totalPages: 0,
            fontSize: 19,
            targetLang: "English",
            lastModified: Date.now()
        };

        let isDark = false;
        let isSidebarOpen = false; 
        let pendingUploadFile = null;
        let activeContextMenuBookId = null;

        const DB_NAME = 'DeepReaderDB_v2';
        const DB_VERSION = 2; 
        let db;

        const els = {
            libraryView: document.getElementById('libraryView'),
            libraryGrid: document.getElementById('libraryGrid'),
            readerView: document.getElementById('readerView'),
            pageContent: document.getElementById('pageContent'),
            titleDisplay: document.getElementById('bookTitleDisplay'),
            pageNavCtrl: document.getElementById('pageNavCtrl'),
            pageInput: document.getElementById('pageInput'),
            pageTotal: document.getElementById('pageTotal'),
            bookmarkBtn: document.getElementById('bookmarkBtn'),
            bookmarkList: document.getElementById('sidebarBookmarks'),
            sidebarToggle: document.getElementById('sidebarToggle'),
            mainSidebar: document.getElementById('mainSidebar'),
            fontSizeSlider: document.getElementById('fontSizeSlider'),
            wordPopover: document.getElementById('wordPopover'),
            targetWord: document.getElementById('targetWord'),
            wordDefinition: document.getElementById('wordDefinition'),
            sentencePopover: document.getElementById('sentencePopover'),
            sentenceOrigText: document.getElementById('sentenceOrigText'),
            sentenceTransText: document.getElementById('sentenceTransText'),
            themeColorMeta: document.getElementById('themeColorMeta')
        };

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('books')) db.createObjectStore('books', { keyPath: 'id' });
                };
                request.onsuccess = (e) => { db = e.target.result; renderLibrary(); resolve(db); };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveBookToDB(book) {
            return new Promise((resolve) => {
                const transaction = db.transaction(['books'], 'readwrite');
                const store = transaction.objectStore('books');
                book.lastModified = Date.now();
                store.put(book).onsuccess = () => resolve();
            });
        }

        async function getBooksFromDB() {
            return new Promise((resolve) => {
                const transaction = db.transaction(['books'], 'readonly');
                const store = transaction.objectStore('books');
                store.getAll().onsuccess = (e) => resolve(e.target.result);
            });
        }

        window.onload = () => {
            initDB();
            els.fontSizeSlider.addEventListener('input', (e) => {
                appState.fontSize = parseInt(e.target.value);
                applyReaderSettings();
            });
            document.getElementById('themeToggle').addEventListener('click', () => {
                isDark = !isDark;
                requestAnimationFrame(() => {
                    document.body.classList.toggle('dark', isDark);
                    // Dynamically update the app window theme color for PWAs
                    els.themeColorMeta.setAttribute('content', isDark ? '#1e1d1c' : '#fdfaee');
                });
            });

            els.pageInput.addEventListener('change', (e) => {
                let val = parseInt(e.target.value);
                if (isNaN(val)) {
                    els.pageInput.value = appState.currentPage + 1;
                    return;
                }
                val = Math.max(1, Math.min(val, appState.totalPages));
                appState.currentPage = val - 1;
                renderPage();
            });
            els.pageInput.addEventListener('focus', (e) => e.target.select());

            document.getElementById('modalLangSelect').addEventListener('change', (e) => {
                if(e.target.value === 'Custom') {
                    document.getElementById('customLangInput').classList.remove('hidden');
                } else {
                    document.getElementById('customLangInput').classList.add('hidden');
                }
            });

            // Click main content area to safely close sidebar
            els.pageContent.addEventListener('click', (e) => {
                if (isSidebarOpen && !e.target.closest('.sentence') && !e.target.closest('.word')) {
                    toggleSidebar();
                }
            });
        };

        function toggleSidebar() {
            isSidebarOpen = !isSidebarOpen;
            if(isSidebarOpen) {
                els.mainSidebar.classList.remove('w-0', 'opacity-0', 'border-transparent');
                els.mainSidebar.classList.add('w-64', 'opacity-100', 'border-[var(--border)]');
            } else {
                els.mainSidebar.classList.add('w-0', 'opacity-0', 'border-transparent');
                els.mainSidebar.classList.remove('w-64', 'opacity-100', 'border-[var(--border)]');
            }
        }

        function returnToLibrary() {
            isSidebarOpen = false;
            els.mainSidebar.classList.add('w-0', 'opacity-0', 'border-transparent');
            els.mainSidebar.classList.remove('w-64', 'opacity-100', 'border-[var(--border)]');
            
            setTimeout(() => {
                showLibrary();
            }, 300);
        }

        function applyReaderSettings() {
            els.pageContent.style.fontSize = `${appState.fontSize}px`;
            els.pageContent.classList.add('is-immersive');
        }

        function showLibrary() {
            els.readerView.classList.add('hidden');
            els.pageNavCtrl.classList.add('hidden');

                clientX = e.changedTouches[0].clientX;

        function migrateOldBookIfNeeded(book) {
            if (book.pages && Array.isArray(book.pages) && book.pages.length) {
                delete book.chapters; 
                return book;
            }
            if (Array.isArray(book.sentences) && book.sentences.length) {
                const byPara = new Map();
                book.sentences.forEach(s => {
                    const id = String(s.paragraphId ?? 0);
                    if (!byPara.has(id)) byPara.set(id, []);
                    byPara.get(id).push(s);
                });
                const paraList = Array.from(byPara.entries())
                    .sort((a,b) => Number(a[0]) - Number(b[0]))
                    .map(([pid, arr], idx) => ({
                        original: arr.map(x => x.original).join(' '),
                        translation: null,
                        paragraphId: `m${pid}`
                    }));
                const P_PER_PAGE = 6;
                const pages = [];
                for (let i = 0; i < paraList.length; i += P_PER_PAGE) {
                    pages.push({ paragraphs: paraList.slice(i, i + P_PER_PAGE) });
                }
                book.pages = pages;
                book.totalPages = pages.length;
                delete book.sentences;
                delete book.chapters;
                return book;
            }
            book.pages = book.pages || [];
            book.totalPages = book.pages.length || 0;
            return book;
        }

        function loadBook(book) {
            book = migrateOldBookIfNeeded(book);
            appState = book;

            appState.totalPages = appState.pages.length;
            appState.currentPage = Math.min(appState.currentPage || 0, Math.max(0, appState.totalPages - 1));

            els.libraryView.classList.add('hidden');
            els.readerView.classList.remove('hidden');
            els.pageNavCtrl.classList.remove('hidden');
            els.sidebarToggle.classList.remove('hidden');

            els.mainSidebar.classList.add('w-0', 'opacity-0', 'border-transparent');

            applyReaderSettings();
            renderPage();
            updateSidebarUI();
        }

        async function processBookUpload(file, selectedLang) {
            let pages = [];

            if (file.name.toLowerCase().endsWith('.pdf')) {
                pages = await extractPdfPagesWithParagraphs(file);
            } else if (file.name.toLowerCase().endsWith('.epub')) {
                pages = await extractEpubPagesWithParagraphs(file);
            } else {
                const text = await file.text();
                const paragraphs = text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);

                const paragraphObjs = paragraphs.map((p, idx) => ({
                    original: p.replace(/\s+/g, ' '),
                    translation: null,
                    paragraphId: `t${idx}`
                }));

                const P_PER_PAGE = 6;
                for (let i = 0; i < paragraphObjs.length; i += P_PER_PAGE) {
                    pages.push({ paragraphs: paragraphObjs.slice(i, i + P_PER_PAGE) });
                }
            }

            appState = {
                id: crypto.randomUUID(),
                title: file.name.replace(/\.[^/.]+$/, ""),
                pages,
                bookmarks: [],
                currentPage: 0,
                totalPages: pages.length,
                fontSize: 19,
                targetLang: selectedLang,
                lastModified: Date.now()
            };

            await saveBookToDB(appState);
            loadBook(appState);
        }

        async function extractPdfPagesWithParagraphs(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const pages = [];

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();

                const items = content.items.map(item => ({
                    str: item.str,
                    x: item.transform[4],
                    y: item.transform[5],
                    w: item.width
                }));

                items.sort((a, b) => {
                    if (Math.abs(a.y - b.y) > 5) return b.y - a.y;
                    return a.x - b.x;
                });

                const lines = [];
                let currentLine = null;
                const sameLine = (y1, y2) => Math.abs(y1 - y2) <= 3.5;

                for (const it of items) {
                    const s = (it.str ?? '');
                    if (!s.trim() && s !== ' ') continue;

                    if (!currentLine || !sameLine(currentLine.y, it.y)) {
                        currentLine = { y: it.y, parts: [] };
                        lines.push(currentLine);
                    }
                    currentLine.parts.push(it);
                }

                const lineObjs = lines.map(ln => {
                    ln.parts.sort((a,b) => a.x - b.x);
                    let lineText = '';
                    let lastX = null;
                    for (const p of ln.parts) {
                        const txt = p.str;
                        if (lastX !== null) {
                            const dist = p.x - lastX;
                            if (dist > 5 && !lineText.endsWith(' ')) lineText += ' ';
                        }
                        lineText += txt;
                        lastX = p.x + p.w;
                    }
                    return { y: ln.y, text: lineText.replace(/\s+/g, ' ').trim() };
                }).filter(l => l.text.length > 0);

                const paragraphs = [];
                let curP = [];
                for (let li = 0; li < lineObjs.length; li++) {
                    const cur = lineObjs[li];
                    const prev = lineObjs[li - 1];

                    if (li === 0) {
                        curP.push(cur);
                        continue;
                    }

                    const gap = Math.abs(prev.y - cur.y);
                    if (gap > 12) {
                        paragraphs.push(curP);
                        curP = [cur];
                    } else {
                        curP.push(cur);
                    }
                }
                if (curP.length) paragraphs.push(curP);

                const paragraphObjs = paragraphs
                    .map((pLines, pIdx) => {
                        let text = pLines.map(x => x.text).join(' ');
                        text = text.replace(/-\s+/g, '');
                        text = text.replace(/\s+/g, ' ').trim();
                        return { original: text, translation: null, paragraphId: `p${i}_${pIdx}` };
                    })
                    .filter(p => p.original.length > 0);

                pages.push({ paragraphs: paragraphObjs });
            }

            for (let i = 0; i < pages.length; i++) {
                if (i < pages.length - 1) {
                    let currentPage = pages[i];
                    let nextPage = pages[i + 1];

                    while (currentPage.paragraphs.length > 0 && nextPage.paragraphs.length > 0) {
                        let lastPara = currentPage.paragraphs[currentPage.paragraphs.length - 1];
                        let firstNextPara = nextPage.paragraphs[0];

                        if (!isParaBreak(lastPara.original, firstNextPara.original)) {
                            lastPara.original += " " + firstNextPara.original;
                            nextPage.paragraphs.shift();
                        } else {
                            break;
                        }
                    }
                }
            }

            const finalPages = [];
            for (let i = 0; i < pages.length; i++) {
                if (pages[i].paragraphs.length > 0) {
                    finalPages.push(pages[i]);
                }
            }

            return finalPages;
        }

        async function extractEpubPagesWithParagraphs(file) {
            const zip = await JSZip.loadAsync(file);
            
            // 1. Locate and parse the container.xml to find the OPF file
            const containerXml = await zip.file("META-INF/container.xml").async("string");
            const parser = new DOMParser();
            const containerDoc = parser.parseFromString(containerXml, "text/xml");
            const opfPath = containerDoc.querySelector("rootfile").getAttribute("full-path");
            const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/')) : '';
            const opfPrefix = opfDir ? opfDir + '/' : '';
            
            // 2. Parse the OPF manifest to get the reading order
            const opfXml = await zip.file(opfPath).async("string");
            const opfDoc = parser.parseFromString(opfXml, "text/xml");
            
            const manifest = {};
            Array.from(opfDoc.querySelectorAll("manifest > item")).forEach(item => {
                manifest[item.getAttribute("id")] = item.getAttribute("href");
            });
            
            const spineIds = Array.from(opfDoc.querySelectorAll("spine > itemref")).map(item => item.getAttribute("idref"));
            
            const paragraphs = [];
            const blockTags = ['P', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'LI', 'DIV', 'BLOCKQUOTE'];
            
            // 3. Extract text from the chapters in reading order
            for (const id of spineIds) {
                const href = manifest[id];
                if (!href) continue;
                
                const filePath = opfPrefix + href;
                const decodedPath = decodeURIComponent(filePath);
                
                const fileObj = zip.file(decodedPath) || zip.file(filePath); 
                if (!fileObj) continue;
                
                const htmlStr = await fileObj.async("string");
                const htmlDoc = parser.parseFromString(htmlStr, "text/html");
                
                if(!htmlDoc.body) continue;

                // Intelligently target only the deepest block elements to prevent duplicate text from nested DIVs
                const elements = htmlDoc.body.querySelectorAll('*');
                Array.from(elements).forEach(el => {
                    if (blockTags.includes(el.tagName.toUpperCase())) {
                        const hasBlockChild = Array.from(el.children).some(child => blockTags.includes(child.tagName.toUpperCase()));
                        if (!hasBlockChild) {
                            let text = el.textContent.replace(/\s+/g, ' ').trim();
                            if (text) {
                                paragraphs.push(text);
                            }
                        }
                    }
                });
            }
            
            // 4. Assemble the text into pages
            const paragraphObjs = paragraphs.map((p, idx) => ({
                original: p,
                translation: null,
                paragraphId: `e${idx}`
            }));

            const pages = [];
            const P_PER_PAGE = 6;
            for (let i = 0; i < paragraphObjs.length; i += P_PER_PAGE) {
                pages.push({ paragraphs: paragraphObjs.slice(i, i + P_PER_PAGE) });
            }
            
            return pages;
        }

        function splitSentences(text) {
            if (!text) return [];
            text = text.trim();
            if (!text) return [];

            const CJK_SPLIT  = /([。！？…\u3002\uff01\uff1f]["\u201d\u2019\uff09\u300d\u300f\u3011】）»]*)/g;
            const LATIN_SPLIT = /([.!?…]+["\'\u201d\u2019\)\]»]*)\s+(?=[A-Z\u00C0-\u024F\u0400-\u04FF\u4e00-\u9fff"\'\u201c\u2018\(\[«\u00a1\u00bf])/g;

            const cjkCount = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\uff00-\uffef]/g) || []).length;
            const isCJK = cjkCount > text.length * 0.15;

            let parts = [];

            if (isCJK) {
                let lastIdx = 0;
                let m;
                CJK_SPLIT.lastIndex = 0;
                while ((m = CJK_SPLIT.exec(text)) !== null) {
                    const end = m.index + m[0].length;
                    const seg = text.slice(lastIdx, end).trim();
                    if (seg) parts.push(seg);
                    lastIdx = end;
                    while (lastIdx < text.length && /\s/.test(text[lastIdx])) lastIdx++;
                }
                const tail = text.slice(lastIdx).trim();
                if (tail) {
                    if (parts.length > 0) parts[parts.length - 1] += tail;
                    else parts.push(tail);
                }
            } else {
                let lastIdx = 0;
                let m;
                LATIN_SPLIT.lastIndex = 0;
                while ((m = LATIN_SPLIT.exec(text)) !== null) {
                    const end = m.index + m[1].length;
                    const seg = text.slice(lastIdx, end).trim();
                    if (seg) parts.push(seg);
                    lastIdx = end;
                    while (lastIdx < text.length && /\s/.test(text[lastIdx])) lastIdx++;
                }
                const tail = text.slice(lastIdx).trim();
                if (tail) {
                    if (/[.!?…。！？]["\'\u201d\u2019\)\]»]*\s*$/.test(tail)) parts.push(tail);
                    else if (parts.length > 0) parts[parts.length - 1] += ' ' + tail;
                    else parts.push(tail);
                }
            }

            const mergedParts = [];
            for (let i = 0; i < parts.length; i++) {
                const current = parts[i];
                if (i > 0) {
                    const prev = mergedParts[mergedParts.length - 1];
                    if (/\b(Dr|Mr|Mrs|Ms|Prof|Sr|Jr|vs|etc|Inc|Ltd)\.[ \u201d"'\)\]»]*$/i.test(prev)) {
                        mergedParts[mergedParts.length - 1] += ' ' + current;
                        continue;
                    }
                }
                mergedParts.push(current);
            }
            parts = mergedParts;

            const MAX_SENTENCE_LEN = 300;
            const final = [];
            for (const s of parts) {
                if (s.length <= MAX_SENTENCE_LEN) {
                    final.push(s);
                    continue;
                }
                const semiParts = s.split(/;\s*/);
                if (semiParts.length > 1 && semiParts.every(p => p.length > 20)) {
                    const rebuilt = [];
                    for (let i = 0; i < semiParts.length; i++) {
                        rebuilt.push(i < semiParts.length - 1 ? semiParts[i] + ';' : semiParts[i]);
                    }
                    final.push(...rebuilt);
                    continue;
                }
                const clauseRe = /,\s+(?=(?:and|but|or|so|yet|for|nor|then|while|where|when|which|who|that|as|the|with|after|before|until|though|although|because|since|if|once|unless|he|she|they|it|his|her|their|we|I|you|Jack|Ennis|[A-Z][a-z]+['']s)\b)/g;
                const clauseParts = [];
                let lastI = 0;
                let cm;
                clauseRe.lastIndex = 0;
                while ((cm = clauseRe.exec(s)) !== null) {
                    const seg = s.slice(lastI, cm.index + 1).trim(); 
                    if (seg.length > 30) {
                        clauseParts.push(seg);
                        lastI = cm.index + 1;
                        while (lastI < s.length && /\s/.test(s[lastI])) lastI++;
                    }
                }
                const clauseTail = s.slice(lastI).trim();
                if (clauseTail) {
                    if (clauseParts.length > 0 && clauseTail.length < 40) clauseParts[clauseParts.length - 1] += ' ' + clauseTail;
                    else clauseParts.push(clauseTail);
                }
                if (clauseParts.length > 1) final.push(...clauseParts);
                else final.push(s); 
            }

            return final.length ? final : [text];
        }

        function isParaBreak(text, nextText = null) {
            if (!text) return true;
            const t = text.trim();

            const curlyOpens  = (t.match(/\u201c/g) || []).length;
            const curlyCloses = (t.match(/\u201d/g) || []).length;
            if (curlyOpens > curlyCloses) return false;
            const straightDbl = (t.match(/"/g) || []).length;
            if (straightDbl % 2 !== 0) return false;

            if (/[-\u2013\u2014]$/.test(t)) return false;
            if (/[,，][ \u201d"'\)\]»]*$/.test(t)) return false;

            if (/\b(Dr|Mr|Mrs|Ms|Prof|Sr|Jr|vs|etc|Inc|Ltd)\.[ \u201d"'\)\]»]*$/i.test(t)) return false;

            if (nextText) {
                const nt = nextText.trim();
                if (/^["'\u2018\u201c\(\[]*[a-z]/.test(nt)) return false;
            }

            if (/[.!?…\u201d"»。！？][ \u201d"'\)\]»]*$/.test(t)) return true;
            if (t.length < 60 && !/[,，]\s*$/.test(t)) return true;

            return false;
        }

        function groupParagraphs(paragraphs) {
            const blocks = [];
            let current = null;

            for (let i = 0; i < paragraphs.length; i++) {
                const p = paragraphs[i];
                const nextP = paragraphs[i + 1] ? paragraphs[i + 1].original : null;

                if (!current) {
                    current = { items: [p], isBreak: isParaBreak(p.original, nextP) };
                } else if (current.isBreak) {
                    blocks.push(current);
                    current = { items: [p], isBreak: isParaBreak(p.original, nextP) };
                } else {
                    current.items.push(p);
                    const combinedText = current.items.map(x => x.original).join(' ');
                    current.isBreak = isParaBreak(combinedText, nextP);
                }
            }
            if (current) blocks.push(current);
            return blocks;
        }

        function makeWordSpans(text, container) {
            const spaceParts = text.split(/(\s+)/);
            
            spaceParts.forEach(part => {
                if (/^\s+$/.test(part)) {
                    container.appendChild(document.createTextNode(part));
                } else if (part) {
                    const tokens = part.match(/[\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\u3400-\u4dbf\u4e00-\u9fff\uac00-\ud7af\uff00-\uffef]|[^\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\u3400-\u4dbf\u4e00-\u9fff\uac00-\ud7af\uff00-\uffef]+/g);
                    
                    if (tokens) {
                        tokens.forEach(token => {
                            const span = document.createElement('span');
                            span.className = 'word';
                            span.innerText = token;
                            container.appendChild(span);
                        });
                    }
                }
            });
        }

        function renderPage() {
            els.pageContent.innerHTML = '';
            els.titleDisplay.innerText = appState.title;

            const page = appState.pages[appState.currentPage] || { paragraphs: [] };
            const blocks = groupParagraphs(page.paragraphs);

            blocks.forEach(block => {
                const blockDiv = document.createElement('div');
                blockDiv.className = 'paragraph-block';

                const textSpan = document.createElement('span');
                textSpan.className = 'paragraph-text';

                const combinedOriginal = block.items.map(p => p.original).join(' ');
                const sentences = splitSentences(combinedOriginal);

                sentences.forEach((sentence, sIdx) => {
                    if (sIdx > 0) textSpan.appendChild(document.createTextNode(' '));
                    const sentenceSpan = document.createElement('span');
                    sentenceSpan.className = 'sentence';

                    sentenceSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        handleSentenceClick(e, sentence);
                    });

                    makeWordSpans(sentence, sentenceSpan);
                    textSpan.appendChild(sentenceSpan);
                });

                blockDiv.appendChild(textSpan);
                els.pageContent.appendChild(blockDiv);
            });

            els.pageInput.value = appState.currentPage + 1;
            els.pageTotal.innerText = `/ ${appState.totalPages}`;
            els.pageContent.scrollTop = 0;
            updateSidebarUI();
        }

        const sentenceTransCache = new Map();
        const wordDefCache = new Map();

        async function translateSentence(sentence) {
            const cacheKey = `${appState.targetLang}::${sentence}`;
            if (sentenceTransCache.has(cacheKey)) return sentenceTransCache.get(cacheKey);

            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        { role: "system", content: `Translate the following sentence into ${appState.targetLang}. Output ONLY the translation, nothing else.` },
                        { role: "user", content: sentence }
                    ],
                    temperature: 0.1,
                    max_tokens: 400
                })
            });

            const data = await response.json();
            const translated = data.choices[0].message.content.trim();
            sentenceTransCache.set(cacheKey, translated);
            return translated;
        }

        function handleSentenceClick(e, originalText) {
            closePopover();
            closeSentencePopover();

            const rect = e.currentTarget.getBoundingClientRect();
            const popover = els.sentencePopover;
            
            popover.classList.remove('hidden');
            popover.style.opacity = '0';
            
            els.sentenceOrigText.innerText = originalText;

            const updatePosition = () => {
                const popRect = popover.getBoundingClientRect();
                
                popover.style.left = `${Math.max(10, Math.min(window.innerWidth - 430, rect.left))}px`;
                
                let topPos = rect.bottom + 8; 
                if (topPos + popRect.height > window.innerHeight - 15) {
                    topPos = rect.top - popRect.height - 8;
                }
                
                popover.style.top = `${topPos}px`;
                popover.style.opacity = '1';
            };

            const cacheKey = `${appState.targetLang}::${originalText}`;
            if (sentenceTransCache.has(cacheKey)) {
                els.sentenceTransText.innerText = sentenceTransCache.get(cacheKey);
                updatePosition();
            } else {
                els.sentenceTransText.innerHTML = '<span class="animate-pulse opacity-50">Consulting AI...</span>';
                updatePosition();
                
                translateSentence(originalText).then(t => {
                    if (els.sentenceOrigText.innerText === originalText) {
                        els.sentenceTransText.innerText = t;
                        updatePosition(); 
                    }
                }).catch(() => {
                    if (els.sentenceOrigText.innerText === originalText) els.sentenceTransText.innerText = 'Translation failed. Click again to retry.';
                });
            }
        }

        function closeSentencePopover() { els.sentencePopover.classList.add('hidden'); }

        async function handleWordClick(e, word) {
            closeSentencePopover();

            const rect = (e.target || e.currentTarget).getBoundingClientRect();
            els.wordPopover.style.left = `${Math.min(window.innerWidth - 250, rect.left)}px`;
            
            els.wordPopover.classList.remove('hidden');
            els.wordPopover.style.opacity = '0';
            
            els.targetWord.innerText = word.replace(/[^\p{L}\p{N}]/gu, '');
            
            let tLang = appState.targetLang;
            let sourceWord = els.targetWord.innerText;
            const cacheKey = `${tLang}::${sourceWord}`;

            const updatePosition = () => {
                const popRect = els.wordPopover.getBoundingClientRect();
                let topPos = rect.bottom + 8;
                if (topPos + popRect.height > window.innerHeight - 15) topPos = rect.top - popRect.height - 8;
                els.wordPopover.style.top = `${topPos}px`;
                els.wordPopover.style.opacity = '1';
            };

            // Check cache first
            if (wordDefCache.has(cacheKey)) {
                els.wordDefinition.innerText = wordDefCache.get(cacheKey);
                setTimeout(updatePosition, 0);
                return;
            }

            els.wordDefinition.innerText = "Consulting AI...";
            setTimeout(updatePosition, 0);

            try {
                let promptStr = `Provide the essential, brief dictionary meaning(s) for the word or character "${sourceWord}". Keep it extremely concise. If the source word "${sourceWord}" is Chinese, include its Pinyin. If the source word is English, include its phonetic transcription (音标). The final definition response MUST be written in ${tLang}.`;

                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ role: "user", content: promptStr }],
                        max_tokens: 80
                    })
                });
                const data = await response.json();
                const definition = data.choices[0].message.content.trim();
                
                // Save to cache
                wordDefCache.set(cacheKey, definition);
                
                // Only update if the user hasn't clicked a different word while waiting
                if (els.targetWord.innerText === sourceWord) {
                    els.wordDefinition.innerText = definition;
                    updatePosition();
                }

            } catch(err) { 
                if (els.targetWord.innerText === sourceWord) {
                    els.wordDefinition.innerText = "Error fetching definition."; 
                    updatePosition();
                }
            }
        }

        function closePopover() { els.wordPopover.classList.add('hidden'); }

        function handleOutsideInteractions(e) {
            if (!els.wordPopover.contains(e.target)) closePopover();
            if (!els.sentencePopover.contains(e.target) && !e.target.closest('.sentence')) closeSentencePopover();
            const ctxMenu = document.getElementById('bookContextMenu');
            if (!ctxMenu.contains(e.target) && !e.target.closest('.book-card')) ctxMenu.classList.add('hidden');
        }

        window.addEventListener('click', handleOutsideInteractions);
        window.addEventListener('touchstart', handleOutsideInteractions, { passive: true });


        els.pageContent.addEventListener('contextmenu', function(e) {
            const wordSpan = e.target.closest('.word');
            if (!wordSpan) return;
            e.preventDefault();
            handleWordClick(e, wordSpan.innerText);
        });

        let longPressTimer = null;
        els.pageContent.addEventListener('touchstart', function(e) {
            const wordSpan = e.target.closest('.word');
            if (!wordSpan) return;
            longPressTimer = setTimeout(() => {
                longPressTimer = null;
                handleWordClick({ target: wordSpan, currentTarget: wordSpan, stopPropagation() {} }, wordSpan.innerText);
            }, 500);
        }, { passive: true });
        els.pageContent.addEventListener('touchend', function() {
            if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        });
        els.pageContent.addEventListener('touchmove', function() {
            if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        });

        function changePage(delta) {
            const next = appState.currentPage + delta;
            if (next >= 0 && next < appState.totalPages) {
                appState.currentPage = next;
                renderPage();
            }
        }

        function toggleBookmark() {
            const page = appState.currentPage;
            const idx = appState.bookmarks.indexOf(page);
            if (idx === -1) appState.bookmarks.push(page);
            else appState.bookmarks.splice(idx, 1);
            appState.bookmarks.sort((a,b) => a-b);

            requestAnimationFrame(() => {
                updateSidebarUI();
                els.bookmarkBtn.style.transform = 'scale(1.12)';
                setTimeout(() => { els.bookmarkBtn.style.transform = ''; }, 120);
            });

            saveBookToDB(appState);
        }

        function updateSidebarUI() {
            els.bookmarkList.innerHTML = appState.bookmarks.length ? '' : '<li class="text-xs text-[var(--text-secondary)] p-2 italic list-none">No bookmarks</li>';
            appState.bookmarks.forEach(p => {
                const li = document.createElement('div');
                li.className = "sidebar-item flex justify-between";
                li.innerHTML = `<span>Page ${p + 1}</span> <span>🔖</span>`;
                li.onclick = () => { appState.currentPage = p; renderPage(); };
                els.bookmarkList.appendChild(li);
            });

            const bookmarked = appState.bookmarks.includes(appState.currentPage);
            els.bookmarkBtn.classList.toggle('is-active', bookmarked);
        }

        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</body>
</html>
